apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: capacitor
  namespace: flux-system
  annotations:
    # Adding websecure is the key here
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
    # If you aren't providing a specific cert, Traefik will use its default/self-signed
    traefik.ingress.kubernetes.io/router.tls: "true" 
spec:
  ingressClassName: kommander-traefik
  rules:
    - host: capacitor.10.122.7.176.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: capacitor
                port:
                  number: 9000