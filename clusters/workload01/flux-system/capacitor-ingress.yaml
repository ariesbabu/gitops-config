apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: capacitor
  namespace: flux-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web        # or websecure if TLS
spec:
  ingressClassName: kommander-traefik
  rules:
    - host: capacitor.10.122.7.176.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix  # Change this from ImplementationSpecific
            backend:
              service:
                name: capacitor
                port:
                  number: 9000
