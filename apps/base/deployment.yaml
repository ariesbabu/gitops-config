apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: image: docker.io/ariesbabu/app-source:77949c4 # {"$imagepolicy": "flux-system:my-app:tag"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: ENV_NAME
              value: "base"
            - name: APP_VERSION
              value: "injected-by-image"
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 256Mi}
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
